<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0E1116" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DBS Price" />
<title>DBS Price</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1116;
    --surface: #171B22;
    --surface-2: #1F242D;
    --line: #262C36;
    --text: #E8EAED;
    --muted: #8B93A0;
    --dbs: #E4002B;
    --up: #2FBF71;
    --down: #FF5A5F;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 24px);
  }
  .app {
    width: 100%;
    max-width: 460px;
    padding-top: 44px;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  /* Header */
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 40px;
  }
  .brand-mark {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.5px;
    color: var(--dbs);
  }
  .brand-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Price hero */
  .hero { margin-bottom: 36px; }
  .name {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .price-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1;
  }
  .currency {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--muted);
    margin-top: 10px;
  }
  .price {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 64px;
    letter-spacing: -1px;
    transition: opacity 0.18s ease;
  }
  .price.pulse { animation: pulse 0.5s ease; }
  @keyframes pulse {
    0% { opacity: 0.35; transform: translateY(2px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .change {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 8px;
    background: var(--surface);
  }
  .change .arrow { font-size: 13px; }
  .change.up { color: var(--up); }
  .change.down { color: var(--down); }
  .change.flat { color: var(--muted); }

  /* Meta grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .cell {
    background: var(--surface);
    padding: 14px 16px;
  }
  .cell .k {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .cell .v {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
  }

  /* Refresh */
  .refresh {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: var(--dbs);
    color: #fff;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: filter 0.15s ease, transform 0.06s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh:hover { filter: brightness(1.08); }
  .refresh:active { transform: scale(0.985); }
  .refresh:disabled { opacity: 0.55; cursor: default; }

  .status {
    margin-top: 16px;
    font-size: 12.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    min-height: 18px;
  }
  .status .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }
  .status.error { color: var(--down); }

  /* Settings */
  .spacer { flex: 1; min-height: 28px; }
  .settings-toggle {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    padding: 10px 0;
    align-self: center;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .settings {
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    display: none;
  }
  .settings.open { display: block; }
  .field { margin-bottom: 14px; }
  .field:last-of-type { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 11px 12px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
  }
  .field input:focus {
    outline: none;
    border-color: var(--dbs);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .save {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface-2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .save:hover { border-color: var(--dbs); }
  .hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    margin-top: 14px;
  }
  .hint a { color: var(--dbs); }

  @media (prefers-reduced-motion: reduce) {
    .price.pulse { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <span class="brand-mark">DBS</span>
    <span class="brand-sub" id="brand-sub">SGX · D05</span>
  </div>

  <div class="hero">
    <div class="name" id="name">DBS Group Holdings</div>
    <div class="price-row">
      <span class="currency" id="currency">S$</span>
      <span class="price" id="price">—</span>
    </div>
    <div id="change" class="change flat"><span class="arrow"></span><span id="change-text">Tap refresh to load</span></div>
  </div>

  <div class="grid">
    <div class="cell"><div class="k">Open</div><div class="v" id="open">—</div></div>
    <div class="cell"><div class="k">Prev Close</div><div class="v" id="prev">—</div></div>
    <div class="cell"><div class="k">Day High</div><div class="v" id="high">—</div></div>
    <div class="cell"><div class="k">Day Low</div><div class="v" id="low">—</div></div>
  </div>

  <button class="refresh" id="refresh">Refresh price</button>
  <div class="status" id="status"></div>

  <div class="spacer"></div>

  <button class="settings-toggle" id="toggle">Settings</button>
  <div class="settings" id="settings">
    <div class="field">
      <label for="key">Twelve Data API key</label>
      <input id="key" type="text" placeholder="Paste your free key" autocomplete="off" spellcheck="false" />
    </div>
    <div class="row2">
      <div class="field">
        <label for="symbol">Symbol</label>
        <input id="symbol" type="text" value="D05" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label for="exchange">Exchange</label>
        <input id="exchange" type="text" value="SGX" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <button class="save" id="save">Save settings</button>
    <div class="hint">
      Get a free key at <a href="https://twelvedata.com/pricing" target="_blank" rel="noopener">twelvedata.com</a> — the free plan covers SGX and gives hundreds of lookups a day. Prices may be delayed. Your key stays on this device only.
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var store = {
    get: function (k, d) { try { var v = localStorage.getItem(k); return v === null ? d : v; } catch (e) { return d; } },
    set: function (k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  };

  var elPrice = $("price"), elChange = $("change"), elChangeText = $("change-text"),
      elName = $("name"), elCurrency = $("currency"), elBrandSub = $("brand-sub"),
      elOpen = $("open"), elPrev = $("prev"), elHigh = $("high"), elLow = $("low"),
      elStatus = $("status"), elRefresh = $("refresh");

  // Load saved settings
  $("key").value = store.get("td_key", "");
  $("symbol").value = store.get("td_symbol", "D05");
  $("exchange").value = store.get("td_exchange", "SGX");

  function fmt(n, dp) {
    var x = parseFloat(n);
    if (isNaN(x)) return "—";
    return x.toLocaleString(undefined, { minimumFractionDigits: dp, maximumFractionDigits: dp });
  }

  function setStatus(msg, isError) {
    elStatus.className = isError ? "status error" : "status";
    elStatus.innerHTML = msg;
  }

  function render(q) {
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    elPrice.textContent = fmt(q.close, 2);
    if (!reduce) {
      elPrice.classList.remove("pulse");
      void elPrice.offsetWidth;
      elPrice.classList.add("pulse");
    }
    var cur = q.currency || "S$";
    elCurrency.textContent = cur === "SGD" ? "S$" : cur;
    elName.textContent = q.name || "DBS Group Holdings";
    elBrandSub.textContent = (q.exchange || "SGX") + " · " + (q.symbol || "D05");

    var chg = parseFloat(q.change), pct = parseFloat(q.percent_change);
    var dir = chg > 0 ? "up" : (chg < 0 ? "down" : "flat");
    var arrow = chg > 0 ? "▲" : (chg < 0 ? "▼" : "•");
    elChange.className = "change " + dir;
    elChange.querySelector(".arrow").textContent = arrow;
    var sign = chg > 0 ? "+" : "";
    elChangeText.textContent = sign + fmt(chg, 2) + "  (" + sign + fmt(pct, 2) + "%) today";

    elOpen.textContent = fmt(q.open, 2);
    elPrev.textContent = fmt(q.previous_close, 2);
    elHigh.textContent = fmt(q.high, 2);
    elLow.textContent = fmt(q.low, 2);

    var when = q.datetime || "";
    var open = (q.is_market_open === true || q.is_market_open === "true");
    var label = open ? "Market open" : "Market closed";
    setStatus('<span class="live-dot" style="background:' + (open ? "var(--up)" : "var(--muted)") + '"></span>' +
              label + " · updated " + when, false);
  }

  function load() {
    var key = store.get("td_key", "").trim();
    var symbol = store.get("td_symbol", "D05").trim();
    var exchange = store.get("td_exchange", "SGX").trim();

    if (!key) {
      setStatus("Add your free API key in Settings to start.", true);
      $("settings").classList.add("open");
      return;
    }

    elRefresh.disabled = true;
    elRefresh.textContent = "Loading…";
    setStatus("Fetching latest price…", false);

    var url = "https://api.twelvedata.com/quote?symbol=" + encodeURIComponent(symbol) +
              (exchange ? "&exchange=" + encodeURIComponent(exchange) : "") +
              "&apikey=" + encodeURIComponent(key);

    fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data && data.status === "error") {
          setStatus("Couldn't load: " + (data.message || "check your key and symbol."), true);
        } else if (data && data.close !== undefined) {
          render(data);
        } else if (data && data.code) {
          setStatus("Couldn't load: " + (data.message || "unexpected response."), true);
        } else {
          setStatus("No data returned for this symbol. Check the symbol and exchange in Settings.", true);
        }
      })
      .catch(function (err) {
        setStatus("Network error — check your connection and try again.", true);
      })
      .finally(function () {
        elRefresh.disabled = false;
        elRefresh.textContent = "Refresh price";
      });
  }

  elRefresh.addEventListener("click", load);

  $("toggle").addEventListener("click", function () {
    $("settings").classList.toggle("open");
  });

  $("save").addEventListener("click", function () {
    store.set("td_key", $("key").value.trim());
    store.set("td_symbol", $("symbol").value.trim() || "D05");
    store.set("td_exchange", $("exchange").value.trim());
    $("settings").classList.remove("open");
    load();
  });

  // Auto-load on open if key exists
  if (store.get("td_key", "").trim()) {
    load();
  } else {
    setStatus("Add your free API key in Settings to start.", true);
    $("settings").classList.add("open");
  }
})();
</script>
</body>
</html>
